<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="band-name-text">Band Engine - Prova / Setlist</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- DİNAMİK ÇEKİRDEK TEMA VE SİSTEM MOTORU -->
    <link rel="stylesheet" href="./core/themes.css">
    <script src="./core/app.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; padding: 20px; display: flex; justify-content: center; }
        .app-container { display: flex; gap: 16px; max-width: 960px; width: 100%; flex-wrap: wrap; }
        .card-box { flex: 1; min-width: 320px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: rgba(255,255,255,0.05); margin-bottom: 6px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .song-item:hover { background: rgba(255,255,255,0.1); }
        .btn-action { background: var(--primary-accent, #0071e3); color: #fff; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body class="theme-apple-pro">
    <div class="app-container">
        <!-- Sol Panel: Tüm Şarkılar -->
        <div class="card-box card">
            <div class="header">
                <h3><i class="fa-solid fa-music"></i> Havuz</h3>
            </div>
            <div id="availableSongs"></div>
        </div>

        <!-- Sağ Panel: Seçilen Setlist -->
        <div class="card-box card">
            <div class="header">
                <h3><i class="fa-solid fa-list-check"></i> Prova Listesi</h3>
                <button class="btn-action" onclick="printSetlist()"><i class="fa-solid fa-print"></i> Yazdır</button>
            </div>
            <div id="selectedSongs"></div>
        </div>
    </div>

    <script>
        let available = [];
        let selected = [];

        async function initRehearsalTemplate() {
            try {
                const res = await fetch(`./playlist.json?t=${Date.now()}`);
                if (!res.ok) throw new Error();
                available = await res.json();
                renderUI();
            } catch(e) {
                document.getElementById("availableSongs").innerHTML = `<p style="font-size:0.85rem; opacity:0.5;">Playlist yüklenemedi.</p>`;
            }
        }

        function renderUI() {
            const availEl = document.getElementById("availableSongs");
            const selectEl = document.getElementById("selectedSongs");
            
            availEl.innerHTML = available.map((s, i) => `
                <div class="song-item" onclick="pick(${i})">
                    <span>${s.title} - <small style="opacity:0.7;">${s.artist}</small></span>
                    <i class="fa-solid fa-plus" style="color:var(--primary-accent);"></i>
                </div>
            `).join('') || '<p style="font-size:0.8rem; opacity:0.5;">Tüm şarkılar seçildi.</p>';

            selectEl.innerHTML = selected.map((s, i) => `
                <div class="song-item" onclick="unpick(${i})">
                    <span><strong>${i+1}.</strong> ${s.title} ${s.key ? '<small>('+s.key+')</small>' : ''}</span>
                    <i class="fa-solid fa-minus" style="color:#ff3b30;"></i>
                </div>
            `).join('') || '<p style="font-size:0.8rem; opacity:0.5;">Listeye eklemek için soldan şarkı seçin.</p>';
        }

        function pick(i) { selected.push(available.splice(i, 1)[0]); renderUI(); }
        function unpick(i) { available.push(selected.splice(i, 1)[0]); renderUI(); }

        function printSetlist() {
            if(selected.length === 0) return alert("Lütfen önce listeye şarkı ekleyin.");
            const bandName = window.AppEngine?.config?.bandName || "Grup";
            const win = window.open("", "_blank");
            win.document.write(`
                <!DOCTYPE html>
                <html><head><title>${bandName} - Setlist</title></head>
                <body style="font-family:monospace; padding:30px; line-height:1.6;">
                    <h2>${bandName.toUpperCase()} - SETLIST</h2>
                    <p>Tarih: ${new Date().toLocaleDateString()}</p><hr/><br/>
                    ${selected.map((s, i) => `<div style="font-size:1.2rem; margin-bottom:8px;"><strong>${i+1}.</strong> ${s.title} - ${s.artist} ${s.key ? '['+s.key+']' : ''}</div>`).join('')}
                </body></html>
            `);
            win.document.close();
        }

        document.addEventListener("DOMContentLoaded", initRehearsalTemplate);
    </script>
</body>
</html>
