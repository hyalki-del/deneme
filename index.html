<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title class="band-name-text">Band Engine</title>

    <!-- Font Awesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- VT323 LED Matris Fontu (Cyberpunk / Retro Teması İçin) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <!-- BAND ENGINE DİNAMİK TEMA VE ÇEKİRDEK SİSTEM (ÇOK ÖNEMLİ) -->
    <link rel="stylesheet" href="./core/themes.css">
    <script src="./core/app.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
        }

        .welcome-card {
            text-align: center;
            max-width: 480px;
            width: 100%;
            padding: 0 16px 20px 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* LED Marquee Kayan Yazı Batanı */
        .led-banner {
            width: calc(100% + 32px);
            height: 60px;
            background-color: #020202;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            margin-left: -16px;
            margin-right: -16px;
        }

        .led-banner::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.5) 40%, transparent 45%);
            background-size: 3px 3px;
            pointer-events: none;
            z-index: 2;
        }

        .led-track {
            display: flex;
            white-space: nowrap;
            width: max-content;
            animation: marqueeSlide 18s linear infinite;
        }

        @keyframes marqueeSlide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .led-content {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-right: 20px;
            font-family: 'VT323', monospace;
            font-size: 2rem;
            line-height: 1;
            color: var(--primary-accent, #ff3300);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .led-content i {
            font-size: 1.5rem;
            color: #ffb700;
        }

        /* İki Sütunlu Izgara Yapısı */
        .content-grid {
            display: flex;
            gap: 12px;
            width: 100%;
            height: 280px;
        }

        /* Sol Sütun: Dinamik Görsel Galerisi */
        .logo-column {
            flex: 1;
            width: 50%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            height: 100%;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            display: block;
            transition: opacity 0.3s ease;
        }

        /* Sağ Sütun: Navigasyon Butonları */
        .navigation-column {
            flex: 1;
            width: 50%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 0 12px;
            color: var(--text-main, #ffffff);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            flex: 1;
        }

        .action-button i {
            font-size: 1.1rem;
            margin-right: 10px;
            width: 20px;
            text-align: center;
            color: var(--primary-accent, #ff4500);
            flex-shrink: 0;
        }

        .action-button span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .action-button:hover, .action-button:active {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-accent, #ff4500);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="theme-apple-pro">

    <div class="welcome-card card">
        <!-- LED Banner Kayan Yazı -->
        <div class="led-banner">
            <div class="led-track">
                <div class="led-content" id="ledText1">
                    <span><i class="fa-solid fa-bolt"></i> <span class="band-name-text">BAND ENGINE</span> LIVE EXPERIENCE</span>
                    <span><i class="fa-solid fa-microphone-lines"></i> STAGE REHEARSAL</span>
                    <span><i class="fa-solid fa-compact-disc"></i> NON-STOP ROCK & METAL</span>
                </div>
                <div class="led-content" aria-hidden="true" id="ledText2">
                    <span><i class="fa-solid fa-bolt"></i> <span class="band-name-text">BAND ENGINE</span> LIVE EXPERIENCE</span>
                    <span><i class="fa-solid fa-microphone-lines"></i> STAGE REHEARSAL</span>
                    <span><i class="fa-solid fa-compact-disc"></i> NON-STOP ROCK & METAL</span>
                </div>
            </div>
        </div>

        <!-- Görsel ve Navigasyon Izgarası -->
        <div class="content-grid">
            <!-- Sol Sütun: Dinamik Fotoğraflar -->
            <div class="logo-column">
                <img id="dynamicLogo" src="https://via.placeholder.com/300x300?text=Gorsel+Yukleniyor" alt="Grup Görseli" class="logo-img">
            </div>

            <!-- Sağ Sütun: Navigasyon Butonları -->
            <nav class="navigation-column">
                <a href="./takvim.html" class="action-button">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>Takvim</span>
                </a>

                <a href="./playlist.html" class="action-button">
                    <i class="fa-solid fa-music"></i>
                    <span>Playlist</span>
                </a>

                <a href="./rehearsal.html" class="action-button">
                    <i class="fa-solid fa-microphone-lines"></i>
                    <span>Prova/Setlist</span>
                </a>
                
                <a href="./advisor.html" class="action-button">
                    <i class="fa-solid fa-dice"></i>
                    <span>Şarkı Seçici</span>
                </a>
            </nav>
        </div>
    </div>

    <script>
        // Config.json'dan Görselleri Okuyan ve Döndüren Mekanizma
        let dynamicImages = [];
        let currentImgIndex = 0;

        async function initDashboard() {
            // AppEngine'in config.json'ı yüklemesini bekle
            if (window.AppEngine) {
                const config = await window.AppEngine.init();
                if (config && config.images && config.images.length > 0) {
                    dynamicImages = config.images;
                    startImageCarousel();
                }
            }
        }

        function startImageCarousel() {
            const imgEl = document.getElementById("dynamicLogo");
            if (!imgEl || dynamicImages.length === 0) return;

            imgEl.src = dynamicImages[0];

            // 3 saniyede bir görseller arası yumuşak geçiş yap
            if (dynamicImages.length > 1) {
                setInterval(() => {
                    imgEl.style.opacity = 0;
                    setTimeout(() => {
                        currentImgIndex = (currentImgIndex + 1) % dynamicImages.length;
                        imgEl.src = dynamicImages[currentImgIndex];
                        imgEl.style.opacity = 1;
                    }, 300);
                }, 3500);
            }
        }

        document.addEventListener("DOMContentLoaded", initDashboard);
    </script>
</body>
</html>
