name: Sync Ultimate Guitar Playlist

on:
  push:
    paths:
      - 'config.json'          # Triggers immediately when admin.html modifies config.json
      - 'key-overrides.json'   # Triggers when custom keys are updated
  schedule:
    - cron: '0 0 * * *'        # Nightly fallback sync (Midnight UTC)
  workflow_dispatch:          # Manual trigger button in GitHub Actions UI

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Ensures full history for clean pushes

      - name: Set up Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute Scraper ETL Pipeline
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const CONFIG_FILE = path.join(process.cwd(), 'config.json');
          const OVERRIDES_FILE = path.join(process.cwd(), 'key-overrides.json');
          const OUTPUT_DIR = path.join(process.cwd(), 'data');
          const OUTPUT_FILE = path.join(OUTPUT_DIR, 'playlist.json');

          /**
           * Normalizes string inputs for deterministic key lookups and uniform path strings.
           * Strips diacritics, noise words, and special characters.
           */
          function normalize(str) {
            return (str || '')
              .toLowerCase()
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/\b(chords?|tabs?|official|version|ver|pro)\b/gi, '')
              .replace(/[^a-z0-9]/g, '');
          }

          /**
           * Decodes standard HTML entities present in UG SSR attributes.
           */
          function decodeHTMLEntities(str) {
            return (str || '')
              .replace(/&quot;/g, '"')
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&#039;/g, "'")
              .replace(/&#39;/g, "'")
              .replace(/&#x27;/gi, "'")
              .replace(/&nbsp;/g, ' ');
          }

          /**
           * Recursively traverses any JSON tree generated by admin.html
           * to locate an Ultimate Guitar URL.
           */
          function extractUgUrl(obj) {
            if (!obj || typeof obj !== 'object') return null;

            const targetKeys = [
              'ugPlaylistUrl', 'ug_playlist_url', 'ugUrl', 'ug_url', 
              'playlistUrl', 'playlist_url', 'ugLink', 'ug_link', 'url'
            ];

            for (const key of targetKeys) {
              if (typeof obj[key] === 'string' && obj[key].includes('ultimate-guitar.com')) {
                return obj[key];
              }
            }

            for (const val of Object.values(obj)) {
              if (typeof val === 'object' && val !== null) {
                const res = extractUgUrl(val);
                if (res) return res;
              } else if (typeof val === 'string' && val.includes('ultimate-guitar.com')) {
                return val;
              }
            }

            return null;
          }

          (async () => {
            console.log('🔍 Locating config.json...');
            if (!fs.existsSync(CONFIG_FILE)) {
              console.error(`❌ FATAL: Config file not found at ${CONFIG_FILE}`);
              process.exit(1);
            }

            let config = {};
            try {
              config = JSON.parse(fs.readFileSync(CONFIG_FILE, 'utf8'));
            } catch (err) {
              console.error('❌ FATAL: config.json contains invalid JSON syntax.');
              process.exit(1);
            }

            const ugUrl = extractUgUrl(config);

            if (!ugUrl) {
              console.error('❌ FATAL: No valid Ultimate Guitar URL found inside config.json.');
              process.exit(1);
            }

            console.log(`🌐 Extracted Target URL: ${ugUrl}`);

            // Load optional key-overrides.json
            let overrides = {};
            if (fs.existsSync(OVERRIDES_FILE)) {
              try {
                overrides = JSON.parse(fs.readFileSync(OVERRIDES_FILE, 'utf8'));
                console.log('📖 Loaded key-overrides.json');
              } catch (e) {
                console.warn('⚠️ Warning: Failed to parse key-overrides.json, proceeding without overrides.');
              }
            }

            const normalizedOverrides = {};
            for (const [k, v] of Object.entries(overrides)) {
              normalizedOverrides[normalize(k)] = v;
            }

            console.log('📡 Fetching HTML payload from Ultimate Guitar...');
            const response = await fetch(ugUrl, {
              headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                'Accept-Language': 'en-US,en;q=0.9',
                'Cache-Control': 'no-cache'
              }
            });

            if (!response.ok) {
              console.error(`❌ HTTP Error: Status code ${response.status} ${response.statusText}`);
              process.exit(1);
            }

            const html = await response.text();

            // Extract SSR js-store data content payload
            const match = html.match(/class="js-store"[^>]*data-content="([^"]+)"/i) ||
                          html.match(/data-content="([^"]+)"[^>]*class="js-store"/i);

            if (!match || !match[1]) {
              console.error('❌ DOM Extraction Error: Could not locate "js-store" payload in HTML.');
              process.exit(1);
            }

            const storeData = JSON.parse(decodeHTMLEntities(match[1]));
            const pageData = storeData.store?.page?.data || storeData.data || {};
            const rawItems = 
              pageData.songbook?.tabs || 
              pageData.playlist?.items || 
              pageData.list?.list || 
              pageData.tabs || 
              [];

            console.log(`📊 Discovered ${rawItems.length} items in target UG playlist.`);

            // Map and normalize payload into schema
            const songs = rawItems
              .map(item => {
                const tab = item.tab || item;
                const title = (tab.song_name || tab.song_title || tab.title || '').trim();
                const artist = (tab.artist_name || tab.band_name || tab.artist || '').trim();
                const defaultKey = 
                  tab.tonality_name || 
                  tab.meta?.tonality_name || 
                  tab.tonality || 
                  tab.key_name || 
                  'N/A';

                const normTitle = normalize(title);
                const normArtist = normalize(artist);

                // Priority: artist:title override -> title-only override -> default UG key
                const compositeKey = `${normArtist}:${normTitle}`;
                const overrideKey = normalizedOverrides[compositeKey] || normalizedOverrides[normTitle];

                return {
                  title,
                  artist,
                  key: overrideKey || defaultKey,
                  file: `./songs/${normArtist}-${normTitle}.txt`
                };
              })
              .filter(s => s.title && s.artist);

            // Ensure directory exists
            if (!fs.existsSync(OUTPUT_DIR)) {
              fs.mkdirSync(OUTPUT_DIR, { recursive: true });
            }

            fs.writeFileSync(OUTPUT_FILE, JSON.stringify(songs, null, 2), 'utf8');
            console.log(`✅ File written successfully: ${OUTPUT_FILE} (${songs.length} total songs)`);
          })();
          EOF

      - name: Commit and Push Updated Dataset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force stage file to bypass potential .gitignore rules
          git add -f data/playlist.json
          
          echo "=== REPOSITORY STATUS ==="
          git status --porcelain
          echo "========================="
          
          if git diff --staged --quiet; then
            echo "ℹ️ Dataset matches repository state byte-for-byte. No commit required."
          else
            echo "🚀 Dataset changes detected. Committing and pushing to origin..."
            git commit -m "build(data): auto-sync playlist.json from UG [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
