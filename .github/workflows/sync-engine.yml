name: Sync Ultimate Guitar Playlist

on:
  schedule:
    - cron: '0 0 * * *' # Executed daily at midnight UTC
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute UG Scraper & Generate data/playlist.json
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const OUTPUT_FILE = path.join(process.cwd(), 'data', 'playlist.json');
          const CONFIG_FILE = path.join(process.cwd(), 'config.json');
          const OVERRIDES_FILE = path.join(process.cwd(), 'key-overrides.json');

          function normalize(str) {
            return (str || '')
              .toLowerCase()
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/\b(chords?|tabs?|official|version|ver|pro)\b/gi, '')
              .replace(/[^a-z0-9]/g, '');
          }

          function decodeHTMLEntities(str) {
            return (str || '')
              .replace(/&quot;/g, '"')
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&#039;/g, "'")
              .replace(/&#39;/g, "'")
              .replace(/&#x27;/gi, "'")
              .replace(/&nbsp;/g, ' ');
          }

          function safeWritePlaylist(data) {
            const dir = path.dirname(OUTPUT_FILE);
            if (!fs.existsSync(dir)) {
              fs.mkdirSync(dir, { recursive: true });
            }
            fs.writeFileSync(OUTPUT_FILE, JSON.stringify(data, null, 2), 'utf8');
          }

          (async () => {
            try {
              if (!fs.existsSync(CONFIG_FILE)) {
                throw new Error(`CRITICAL: ${CONFIG_FILE} not found in root.`);
              }

              const config = JSON.parse(fs.readFileSync(CONFIG_FILE, 'utf8'));
              const ugUrl = config.ugPlaylistUrl;

              if (!ugUrl || typeof ugUrl !== 'string' || !ugUrl.startsWith('http')) {
                console.warn('WARNING: Missing or invalid ugPlaylistUrl in config.json.');
                safeWritePlaylist([]);
                process.exit(0);
              }

              let overrides = {};
              if (fs.existsSync(OVERRIDES_FILE)) {
                try {
                  overrides = JSON.parse(fs.readFileSync(OVERRIDES_FILE, 'utf8'));
                } catch (e) {
                  console.warn('WARNING: Failed to parse key-overrides.json');
                }
              }

              const normalizedOverrides = {};
              for (const [key, val] of Object.entries(overrides)) {
                normalizedOverrides[normalize(key)] = val;
              }

              console.log(`[ETL] Fetching Ultimate Guitar Data from: ${ugUrl}`);

              const response = await fetch(ugUrl, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.9'
                }
              });

              if (!response.ok) {
                throw new Error(`HTTP Error Status: ${response.status} ${response.statusText}`);
              }

              const html = await response.text();

              const match = html.match(/class="js-store"[^>]*data-content="([^"]+)"/i) ||
                            html.match(/data-content="([^"]+)"[^>]*class="js-store"/i);

              if (!match || !match[1]) {
                throw new Error('UG DOM Schema match failed: Could not find js-store data payload.');
              }

              const decodedJson = decodeHTMLEntities(match[1]);
              const storeData = JSON.parse(decodedJson);

              const pageData = storeData.store?.page?.data || storeData.data || {};
              const rawItems = 
                pageData.songbook?.tabs || 
                pageData.playlist?.items || 
                pageData.list?.list || 
                pageData.tabs || 
                [];

              const songs = rawItems
                .map(item => {
                  const tab = item.tab || item;
                  const title = (tab.song_name || tab.song_title || tab.title || '').trim();
                  const artist = (tab.artist_name || tab.band_name || tab.artist || '').trim();
                  
                  const defaultKey = 
                    tab.tonality_name || 
                    tab.meta?.tonality_name || 
                    tab.tonality || 
                    tab.key_name || 
                    'N/A';

                  const normTitle = normalize(title);
                  const normArtist = normalize(artist);

                  const compositeKey = `${normArtist}:${normTitle}`;
                  const overrideKey = normalizedOverrides[compositeKey] || normalizedOverrides[normTitle];

                  return {
                    title,
                    artist,
                    key: overrideKey || defaultKey,
                    file: `./songs/${normArtist}-${normTitle}.txt`
                  };
                })
                .filter(s => s.title && s.artist);

              console.log(`[SUCCESS] Extracted and transformed ${songs.length} songs.`);
              safeWritePlaylist(songs);

            } catch (err) {
              console.error('[FATAL] Pipeline Failed:', err.message);
              if (!fs.existsSync(OUTPUT_FILE)) {
                safeWritePlaylist([]);
              }
              process.exit(1);
            }
          })();
          EOF

      - name: Commit & Push Playlist Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/playlist.json
          git diff --staged --quiet || (git commit -m "build(data): auto-update playlist.json from UG [skip ci]" && git push)
