- name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add the file even if gitignore rules exist
          git add -f data/playlist.json
          
          # Print git status to action logs for complete transparency
          echo "=== GIT STATUS ==="
          git status --porcelain
          echo "=================="
          
          # Check if there are staged changes
          if git diff --staged --quiet; then
            echo "ℹ️ The extracted 37 songs match the repository version line-for-line. No commit needed."
          else
            echo "🚀 New or updated song data detected! Committing and pushing..."
            git commit -m "build(data): update playlist.json [37 songs] [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
