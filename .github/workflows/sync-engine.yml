name: Sync Ultimate Guitar Playlist

on:
  push:
    paths:
      - 'config.json'          # Triggers immediately whenever admin.html updates config.json
      - 'key-overrides.json'   # Triggers when song keys are overridden
  schedule:
    - cron: '0 0 * * *'        # Nightly fallback sync
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract UG Link & Process ETL Pipeline
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const CONFIG_FILE = path.join(process.cwd(), 'config.json');
          const OVERRIDES_FILE = path.join(process.cwd(), 'key-overrides.json');
          const OUTPUT_FILE = path.join(process.cwd(), 'data', 'playlist.json');

          function normalize(str) {
            return (str || '')
              .toLowerCase()
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/\b(chords?|tabs?|official|version|ver|pro)\b/gi, '')
              .replace(/[^a-z0-9]/g, '');
          }

          function decodeHTMLEntities(str) {
            return (str || '')
              .replace(/&quot;/g, '"')
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&#039;/g, "'")
              .replace(/&#39;/g, "'")
              .replace(/&#x27;/gi, "'")
              .replace(/&nbsp;/g, ' ');
          }

          /**
           * Recursively traverses any nested object generated by admin.html
           * to discover an Ultimate Guitar URL.
           */
          function extractUgUrl(obj) {
            if (!obj || typeof obj !== 'object') return null;

            // Direct property check across common admin naming conventions
            const keysToTest = [
              'ugPlaylistUrl', 'ug_playlist_url', 'ugUrl', 'ug_url', 
              'playlistUrl', 'playlist_url', 'ugLink', 'ug_link', 'url'
            ];

            for (const key of keysToTest) {
              if (typeof obj[key] === 'string' && obj[key].includes('ultimate-guitar.com')) {
                return obj[key];
              }
            }

            // Depth-first traversal for nested config structures (e.g. config.sources.ug)
            for (const value of Object.values(obj)) {
              if (typeof value === 'object' && value !== null) {
                const found = extractUgUrl(value);
                if (found) return found;
              } else if (typeof value === 'string' && value.includes('ultimate-guitar.com')) {
                return value;
              }
            }

            return null;
          }

          function safeWritePlaylist(data) {
            const dir = path.dirname(OUTPUT_FILE);
            if (!fs.existsSync(dir)) {
              fs.mkdirSync(dir, { recursive: true });
            }
            fs.writeFileSync(OUTPUT_FILE, JSON.stringify(data, null, 2), 'utf8');
          }

          (async () => {
            try {
              // 1. Verify config.json exists
              if (!fs.existsSync(CONFIG_FILE)) {
                console.error(`❌ [Config Error]: Could not locate config.json at ${CONFIG_FILE}`);
                safeWritePlaylist([]);
                process.exit(1);
              }

              // 2. Parse JSON output from admin.html
              let config = {};
              try {
                config = JSON.parse(fs.readFileSync(CONFIG_FILE, 'utf8'));
              } catch (e) {
                console.error('❌ [Config Error]: admin.html saved malformed JSON into config.json.');
                safeWritePlaylist([]);
                process.exit(1);
              }

              // 3. Extract target URL using dynamic graph traversal
              const ugUrl = extractUgUrl(config);

              if (!ugUrl) {
                console.warn('⚠️ [Config Notice]: No Ultimate Guitar URL found inside config.json.');
                console.warn('Please update the UG URL field in admin.html.');
                safeWritePlaylist([]);
                process.exit(0);
              }

              console.log(`🔗 [Config Discovered]: Extracted URL -> ${ugUrl}`);

              // 4. Load Key Overrides
              let overrides = {};
              if (fs.existsSync(OVERRIDES_FILE)) {
                try {
                  overrides = JSON.parse(fs.readFileSync(OVERRIDES_FILE, 'utf8'));
                } catch (e) {
                  console.warn('⚠️ [Warning]: Failed to parse key-overrides.json');
                }
              }

              const normalizedOverrides = {};
              for (const [key, val] of Object.entries(overrides)) {
                normalizedOverrides[normalize(key)] = val;
              }

              // 5. Scrape HTML Payload
              console.log('📡 Fetching payload from Ultimate Guitar...');
              const response = await fetch(ugUrl, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.9',
                  'Cache-Control': 'no-cache'
                }
              });

              if (!response.ok) {
                throw new Error(`HTTP Error ${response.status}: ${response.statusText}`);
              }

              const html = await response.text();

              // 6. Parse SSR JSON Store
              const match = html.match(/class="js-store"[^>]*data-content="([^"]+)"/i) ||
                            html.match(/data-content="([^"]+)"[^>]*class="js-store"/i);

              if (!match || !match[1]) {
                throw new Error('UG Schema match failure: Could not find js-store data payload in HTML.');
              }

              const storeData = JSON.parse(decodeHTMLEntities(match[1]));
              const pageData = storeData.store?.page?.data || storeData.data || {};
              const rawItems = 
                pageData.songbook?.tabs || 
                pageData.playlist?.items || 
                pageData.list?.list || 
                pageData.tabs || 
                [];

              // 7. Map to Core Schema
              const songs = rawItems
                .map(item => {
                  const tab = item.tab || item;
                  const title = (tab.song_name || tab.song_title || tab.title || '').trim();
                  const artist = (tab.artist_name || tab.band_name || tab.artist || '').trim();
                  const defaultKey = 
                    tab.tonality_name || 
                    tab.meta?.tonality_name || 
                    tab.tonality || 
                    tab.key_name || 
                    'N/A';

                  const normTitle = normalize(title);
                  const normArtist = normalize(artist);
                  const compositeKey = `${normArtist}:${normTitle}`;
                  const overrideKey = normalizedOverrides[compositeKey] || normalizedOverrides[normTitle];

                  return {
                    title,
                    artist,
                    key: overrideKey || defaultKey,
                    file: `./songs/${normArtist}-${normTitle}.txt`
                  };
                })
                .filter(s => s.title && s.artist);

              console.log(`✅ [ETL Complete]: Successfully extracted ${songs.length} songs.`);
              safeWritePlaylist(songs);

            } catch (err) {
              console.error('💥 [Pipeline Failure]:', err.message);
              safeWritePlaylist([]);
              process.exit(1);
            }
          })();
          EOF

      - name: Commit & Push Updated Playlist Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/playlist.json
          git diff --staged --quiet || (git commit -m "build(data): auto-update playlist.json from config changes [skip ci]" && git push)
