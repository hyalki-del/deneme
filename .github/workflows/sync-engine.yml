name: Sync Ultimate Guitar Playlist

on:
  push:
    paths:
      - 'config.json'
      - 'key-overrides.json'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Execute Scraper ETL Pipeline
        run: |
          node --no-warnings - << 'EOF'
          const fs = require('fs');
          const path = require('path');

          // Explicitly use the GitHub Workspace root directory
          const WORKSPACE = process.env.GITHUB_WORKSPACE || process.cwd();
          const CONFIG_FILE = path.join(WORKSPACE, 'config.json');
          const OVERRIDES_FILE = path.join(WORKSPACE, 'key-overrides.json');
          const OUTPUT_DIR = path.join(WORKSPACE, 'data');
          const OUTPUT_FILE = path.join(OUTPUT_DIR, 'playlist.json');

          function normalize(str) {
            return (str || '')
              .toLowerCase()
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/\b(chords?|tabs?|official|version|ver|pro)\b/gi, '')
              .replace(/[^a-z0-9]/g, '');
          }

          function decodeHTMLEntities(str) {
            return (str || '')
              .replace(/&quot;/g, '"')
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/&#039;/g, "'")
              .replace(/&#39;/g, "'")
              .replace(/&#x27;/gi, "'")
              .replace(/&nbsp;/g, ' ');
          }

          function extractUgUrl(obj) {
            if (!obj || typeof obj !== 'object') return null;
            const targetKeys = [
              'ugPlaylistUrl', 'ug_playlist_url', 'ugUrl', 'ug_url', 
              'playlistUrl', 'playlist_url', 'ugLink', 'ug_link', 'url'
            ];

            for (const key of targetKeys) {
              if (typeof obj[key] === 'string' && obj[key].includes('ultimate-guitar.com')) {
                return obj[key];
              }
            }

            for (const val of Object.values(obj)) {
              if (typeof val === 'object' && val !== null) {
                const res = extractUgUrl(val);
                if (res) return res;
              } else if (typeof val === 'string' && val.includes('ultimate-guitar.com')) {
                return val;
              }
            }
            return null;
          }

          (async () => {
            console.log(`📌 Workspace Root: ${WORKSPACE}`);
            
            if (!fs.existsSync(CONFIG_FILE)) {
              console.error(`❌ FATAL: Config file missing at ${CONFIG_FILE}`);
              process.exit(1);
            }

            let config = {};
            try {
              config = JSON.parse(fs.readFileSync(CONFIG_FILE, 'utf8'));
            } catch (err) {
              console.error('❌ FATAL: config.json is not valid JSON.');
              process.exit(1);
            }

            const ugUrl = extractUgUrl(config);
            if (!ugUrl) {
              console.error('❌ FATAL: No valid Ultimate Guitar URL found inside config.json.');
              process.exit(1);
            }

            console.log(`🌐 Target UG URL: ${ugUrl}`);

            let overrides = {};
            if (fs.existsSync(OVERRIDES_FILE)) {
              try {
                overrides = JSON.parse(fs.readFileSync(OVERRIDES_FILE, 'utf8'));
              } catch (e) {}
            }

            const normalizedOverrides = {};
            for (const [k, v] of Object.entries(overrides)) {
              normalizedOverrides[normalize(k)] = v;
            }

            console.log('📡 Fetching HTML from Ultimate Guitar...');
            const response = await fetch(ugUrl, {
              headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                'Accept-Language': 'en-US,en;q=0.9',
                'Cache-Control': 'no-cache'
              }
            });

            if (!response.ok) {
              console.error(`❌ HTTP Error: ${response.status} ${response.statusText}`);
              process.exit(1);
            }

            const html = await response.text();
            const match = html.match(/class="js-store"[^>]*data-content="([^"]+)"/i) ||
                          html.match(/data-content="([^"]+)"[^>]*class="js-store"/i);

            if (!match || !match[1]) {
              console.error('❌ DOM Match Error: Could not find js-store payload.');
              process.exit(1);
            }

            const storeData = JSON.parse(decodeHTMLEntities(match[1]));
            const pageData = storeData.store?.page?.data || storeData.data || {};
            const rawItems = 
              pageData.songbook?.tabs || 
              pageData.playlist?.items || 
              pageData.list?.list || 
              pageData.tabs || 
              [];

            console.log(`📊 Discovered ${rawItems.length} items in playlist payload.`);

            const songs = rawItems
              .map(item => {
                const tab = item.tab || item;
                const title = (tab.song_name || tab.song_title || tab.title || '').trim();
                const artist = (tab.artist_name || tab.band_name || tab.artist || '').trim();
                const defaultKey = tab.tonality_name || tab.meta?.tonality_name || tab.tonality || tab.key_name || 'N/A';

                const normTitle = normalize(title);
                const normArtist = normalize(artist);
                const compositeKey = `${normArtist}:${normTitle}`;
                const overrideKey = normalizedOverrides[compositeKey] || normalizedOverrides[normTitle];

                return {
                  title,
                  artist,
                  key: overrideKey || defaultKey,
                  file: `./songs/${normArtist}-${normTitle}.txt`
                };
              })
              .filter(s => s.title && s.artist);

            if (!fs.existsSync(OUTPUT_DIR)) {
              fs.mkdirSync(OUTPUT_DIR, { recursive: true });
            }

            const jsonString = JSON.stringify(songs, null, 2);
            fs.writeFileSync(OUTPUT_FILE, jsonString, 'utf8');

            console.log(`✅ File written to: ${OUTPUT_FILE}`);
            console.log(`📏 File Size on Disk: ${Buffer.byteLength(jsonString)} bytes`);
            console.log(`🎵 Songs Processed: ${songs.length}`);
          })();
          EOF

      - name: Verify File and Commit to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          echo "🔍 Checking disk contents of data/playlist.json..."
          if [ -f "data/playlist.json" ]; then
            echo "📄 Preview of generated data/playlist.json (first 10 lines):"
            head -n 10 data/playlist.json
          else
            echo "❌ ERROR: data/playlist.json does not exist on disk!"
            exit 1
          fi

          # Stage file explicitly
          git add -f data/playlist.json

          echo "=== GIT STATUS ==="
          git status
          echo "=================="

          # Check if git has staged changes
          if git diff --staged --quiet; then
            echo "⚠️ Git detected NO changes between workspace and git index."
            echo "Attempting forced commit..."
            git commit --allow-empty -m "build(data): forced sync check [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "🚀 Staged changes found! Committing to branch..."
            git commit -m "build(data): sync playlist.json from UG [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
