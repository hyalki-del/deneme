name: Sync Band Playlist & Assets

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch UG Playlist Data
        run: |
          node -e "
          const fs = require('fs');
          (async () => {
            if (!fs.existsSync('config.json')) process.exit(0);
            const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
            if (!config.ugPlaylistUrl) process.exit(0);
            
            console.log('UG Çalma listesi çekiliyor: ' + config.ugPlaylistUrl);
            // UG Scraper Logic Here...
          })();
          "

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync playlist data" && git push)
