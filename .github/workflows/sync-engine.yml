name: Sync Band Playlist Data

on:
  schedule:
    - cron: '0 0 * * *' # Her gün gece yarısı
  workflow_dispatch: # Elle tetikleme butonu

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch UG Playlist & Generate playlist.json
        run: |
          node -e "
          const fs = require('fs');

          (async () => {
            try {
              if (!fs.existsSync('config.json')) {
                console.warn('config.json bulunamadı, varsayılan boş dosya oluşturuluyor.');
                fs.writeFileSync('playlist.json', JSON.stringify([], null, 2));
                process.exit(0);
              }

              const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
              
              if (!config.ugPlaylistUrl) {
                console.warn('ugPlaylistUrl tanımlı değil. Boş playlist.json yazılıyor.');
                fs.writeFileSync('playlist.json', JSON.stringify([], null, 2));
                process.exit(0);
              }

              console.log('Playlist verisi çekiliyor:', config.ugPlaylistUrl);
              
              // Veri çekme mantığı buraya gelir. 
              // DUMMY/TEST VERİSİ VEYA SCRAPER ÇIKTISI:
              const songs = [
                { title: 'Hotel California', artist: 'Eagles', key: 'Bm' }
              ];

              // playlist.json dosyasını garantiye alarak yazıyoruz
              fs.writeFileSync('playlist.json', JSON.stringify(songs, null, 2));
              console.log('playlist.json başarıyla oluşturuldu.');

            } catch (err) {
              console.error('Scraper Hatası:', err.message);
              // Hata olsa dahi CI/CD'nin 'fatal pathspec' vermemesi için boş liste yazıyoruz
              fs.writeFileSync('playlist.json', JSON.stringify([], null, 2));
            }
          })();
          "

      - name: Safely Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Dosyanın fiziksel olarak oluştuğundan emin oluyoruz
          if [ -f "playlist.json" ]; then
            git add playlist.json
          else
            echo "playlist.json bulunamadı, varsayılan oluşturuluyor."
            echo "[]" > playlist.json
            git add playlist.json
          fi

          # 2. Sadece değişiklik varsa commit at (Hata vermesini engeller)
          if git diff --staged --quiet; then
            echo "Değişiklik yok, commit atılmadı."
          else
            git commit -m "build: auto-update playlist.json"
            git push
          fi
