<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="band-name-text">Band Engine - Şarkı Seçici</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- DİNAMİK ÇEKİRDEK TEMA VE SİSTEM MOTORU -->
    <link rel="stylesheet" href="./core/themes.css">
    <script src="./core/app.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .advisor-card { max-width: 420px; width: 100%; padding: 32px; text-align: center; }
        .display-box { background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 32px 16px; margin: 24px 0; font-size: 1.25rem; font-weight: bold; min-height: 110px; display: flex; align-items: center; justify-content: center; word-break: break-word; }
        .btn-spin { background: var(--primary-accent, #0071e3); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; transition: transform 0.1s, background 0.2s; }
        .btn-spin:active { transform: scale(0.98); }
    </style>
</head>
<body class="theme-apple-pro">
    <div class="advisor-card card">
        <h2><i class="fa-solid fa-dice"></i> Sıradaki Şarkı</h2>
        <div class="display-box" id="songDisplay">Rastgele Şarkı İçin Butona Basın</div>
        <button class="btn-spin" onclick="spin()"><i class="fa-solid fa-shuffle"></i> SEÇ</button>
    </div>

    <script>
        let playlistData = [];

        async function initAdvisorTemplate() {
            try {
                const res = await fetch(`./playlist.json?t=${Date.now()}`);
                if (!res.ok) throw new Error();
                playlistData = await res.json();
            } catch(e) {
                document.getElementById("songDisplay").textContent = "Playlist yüklenemedi.";
            }
        }

        function spin() {
            const display = document.getElementById("songDisplay");
            if(playlistData.length === 0) return display.textContent = "Çalma listesi boş!";
            
            let count = 0;
            const timer = setInterval(() => {
                const randomSong = playlistData[Math.floor(Math.random() * playlistData.length)];
                display.textContent = `${randomSong.title} - ${randomSong.artist}`;
                count++;
                if(count > 18) {
                    clearInterval(timer);
                }
            }, 70);
        }

        document.addEventListener("DOMContentLoaded", initAdvisorTemplate);
    </script>
</body>
</html>
